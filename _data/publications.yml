# =====================================================================
#  论文列表 / Publications
#  按发表年份倒序排列，year 用于分组显示
#  字段说明：
#    title    : 论文标题（en + zh，zh 可与 en 相同）
#    authors  : 作者列表，用 ; 分隔，自己用 **包围 会高亮显示
#    venue    : 期刊 / 会议名称
#    year     : 发表年份（数字）
#    type     : journal / conference / preprint / workshop
#    badge    : 角标（例如 Oral, Best Paper, CCF-A）
#    pdf      : PDF 链接
#    code     : 代码链接
#    arxiv    : arXiv 链接
#    project  : 项目主页
#    bibtex   : BibTeX 链接
#    image    : 论文缩略图路径（可选，放在 /assets/img/）
# =====================================================================

- title:
    en: "An Example Paper Title on Some Interesting Topic"
    zh: "一篇关于某个有趣方向的示例论文"
  authors: "**Your Name**; Collaborator A; Collaborator B; Senior Advisor"
  venue:
    en: "Conference on Something Important (XXX)"
    zh: "某重要国际会议 (XXX)"
  year: 2025
  type: conference
  badge: "Oral"
  arxiv: "https://arxiv.org/abs/0000.00000"
  pdf: "#"
  code: "https://github.com/yourusername/repo"
  project: "#"


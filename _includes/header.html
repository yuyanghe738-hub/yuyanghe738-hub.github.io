<nav class="toc" aria-label="Sections">
  <div class="toc-inner">
    <ul class="toc-list">
      {% for item in site.toc %}
        <li><a href="#{{ item.id }}" data-toc="{{ item.id }}">{{ item.label }}</a></li>
      {% endfor %}
    </ul>
    <button id="theme-toggle" class="mini-btn" aria-label="Toggle dark mode" title="Toggle theme">
      <span class="theme-icon">◐</span>
    </button>
  </div>
</nav>

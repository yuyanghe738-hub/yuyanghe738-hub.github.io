<nav class="toc" aria-label="Sections">
  <div class="toc-inner">
    <ul class="toc-list">
      {% for item in site.toc %}
        <li>
          <a href="#{{ item.id }}" data-toc="{{ item.id }}">
            <span data-en>{{ item.en }}</span>
            <span data-zh>{{ item.zh }}</span>
          </a>
        </li>
      {% endfor %}
    </ul>
    <div class="toc-controls">
      <button id="lang-toggle" class="mini-btn" aria-label="Toggle language" title="切换语言 / Switch language">
        <span data-en>中</span>
        <span data-zh>EN</span>
      </button>
      <button id="theme-toggle" class="mini-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon">◐</span>
      </button>
    </div>
  </div>
</nav>

# =====================================================================
#  Site Settings  —  edit your info here
# =====================================================================

title:        "Your Name"
description:  "Academic homepage of Your Name."
url:          ""
baseurl:      ""

# Profile
author:
  name:        "Your Name"
  email:       "your.email@example.com"
  role:        "Undergraduate Student, Department of XXX"
  affiliation: "University of YYY · Honors Program"

# Header link row (leave any field empty to hide)
links:
  email:   "your.email@example.com"
  scholar: ""
  github:  "https://github.com/yuyanghe738-hub"
  website: ""
  arxiv:   ""
  cv:      ""

# In-page TOC (anchor IDs into the single page)
toc:
  - { id: "about",        label: "About"        }
  - { id: "news",         label: "News"         }
  - { id: "publications", label: "Publications" }
  - { id: "experience",   label: "Experience"   }
  - { id: "honors",       label: "Honors"       }
  - { id: "hobbies",      label: "Hobbies"      }

# Personal quote shown above the footer
quote:
  text:   "It rained for so many days, yet it did not wet me. The rainy season was within my heart — I had drenched myself."
  source: "Sanmao"
  work:   "The Rainy Season Will Not Come Again"

# Cursor-follower image — set empty to disable
cursor_pet: "/assets/img/profile.png"

markdown:    kramdown
permalink:   pretty
plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
